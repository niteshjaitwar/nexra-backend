# Workstation-only profile. Activate with dev so Flyway/MySQL from auth-dev still apply:
#   SPRING_PROFILES_ACTIVE=dev,local mvn spring-boot:run
# Overrides unset AUTH_* with local defaults. Never use this profile in shared or production environments.

spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/nexradb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${AUTH_DB_USERNAME:root}
spring.datasource.password=${AUTH_DB_PASSWORD:root}

# >=32 characters (required when running with production profile).
app.auth.jwt.secret=${AUTH_JWT_SECRET:nexra-local-only-jwt-secret-min-32-chars!!}
# >=16 characters for OAuth client bootstrap.
app.auth.oauth2.default-client-secret=${AUTH_OAUTH2_DEFAULT_CLIENT_SECRET:nexra-local-oauth2-secret-16chars}
