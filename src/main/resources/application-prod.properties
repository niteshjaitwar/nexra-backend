spring.config.import=optional:classpath:application-auth-prod.properties,optional:classpath:application-employee-prod.properties,optional:classpath:application-attendance-prod.properties,optional:classpath:application-leave-prod.properties,optional:classpath:application-timesheet-prod.properties,optional:classpath:application-onboarding-prod.properties,optional:classpath:application-performance-prod.properties,optional:classpath:application-recruitment-prod.properties,optional:classpath:application-expense-prod.properties,optional:classpath:application-payroll-prod.properties,optional:classpath:application-crm-prod.properties

# OpenAPI endpoints are disabled by default in production and can be
# re-enabled explicitly for controlled environments.
springdoc.api-docs.enabled=${NEXRA_PROD_OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${NEXRA_PROD_OPENAPI_ENABLED:false}

nexra.common.rate-limit.distributed-enabled=true
nexra.common.rate-limit.trust-forwarded-headers=true
nexra.common.rate-limit.redis-key-prefix=${NEXRA_RATE_LIMIT_REDIS_PREFIX:nexra:ratelimit}
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.tracing.enabled=true
management.tracing.sampling.probability=${NEXRA_TRACING_SAMPLING_PROBABILITY:0.10}
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:}
management.endpoint.env.enabled=false
management.endpoint.beans.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false
server.error.include-binding-errors=never
