spring.application.name=nexra
spring.threads.virtual.enabled=true
spring.config.import=optional:classpath:application-auth.properties,optional:classpath:application-employee.properties,optional:classpath:application-attendance.properties,optional:classpath:application-leave.properties,optional:classpath:application-timesheet.properties,optional:classpath:application-onboarding.properties,optional:classpath:application-performance.properties,optional:classpath:application-recruitment.properties,optional:classpath:application-expense.properties,optional:classpath:application-payroll.properties,optional:classpath:application-crm.properties

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.tracing.enabled=true
management.tracing.sampling.probability=1.0

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.repositories.enabled=false

logging.level.root=INFO
logging.level.com.nexra.hrms.nexra=INFO

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ---- Common infrastructure defaults (com.nexra.hrms.nexra.common) ----
nexra.common.rate-limit.enabled=true
nexra.common.rate-limit.capacity=120
nexra.common.rate-limit.refill-period=PT1M
nexra.common.rate-limit.distributed-enabled=false
nexra.common.rate-limit.redis-key-prefix=nexra:ratelimit

# ---- OpenAPI / Swagger (springdoc) ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.display-request-duration=true
nexra.openapi.title=Nexra Platform API
nexra.openapi.version=1.0.0
nexra.openapi.description=Modular HRMS + CRM platform for the Nexra suite.
nexra.openapi.contact.name=Nexra Engineering
nexra.openapi.contact.email=engineering@nexra.example
nexra.openapi.server-url=http://localhost:8080

# ---- Logging pattern: include requestId (MDC) and level markers ----
logging.pattern.level=%5p [%X{requestId:-}]
