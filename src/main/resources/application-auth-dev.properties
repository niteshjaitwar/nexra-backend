server.port=8081

spring.datasource.url=${AUTH_DB_URL:jdbc:mysql://localhost:3306/nexradb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${AUTH_DB_USERNAME:root}
spring.datasource.password=${AUTH_DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Redis and mail are soft dependencies in dev; hide them from the composite health endpoint
# so local workstation health is UP without requiring Redis + SMTP locally. Production
# keeps the default behaviour and exposes both indicators.
management.health.redis.enabled=false
management.health.mail.enabled=false

app.auth.security.redis-enabled=false
app.auth.expose-verification-token-in-response=true
app.auth.bootstrap.enabled=true
app.auth.mail.enabled=${AUTH_MAIL_ENABLED:false}
app.auth.mail.from=${AUTH_MAIL_FROM:noreply@nexra.local}
# Keep the default dev profile bootable on a local workstation while still
# allowing explicit AUTH_* environment variables to override every value.
app.auth.jwt.secret=${AUTH_JWT_SECRET:nexra-local-only-jwt-secret-min-32-chars!!}
app.auth.oauth2.default-client-secret=${AUTH_OAUTH2_DEFAULT_CLIENT_SECRET:nexra-local-oauth2-secret-16chars}
app.auth.oauth2.ephemeral-key-enabled=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${AUTH_SMTP_USERNAME:}
spring.mail.password=${AUTH_SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

logging.file.name=target/auth-dev.log
