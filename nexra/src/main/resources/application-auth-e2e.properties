server.port=0

spring.datasource.url=jdbc:h2:mem:nexra_hrms_auth_e2e;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.auth.security.redis-enabled=false
app.auth.mail.enabled=false
app.auth.expose-verification-token-in-response=true
app.auth.bootstrap.enabled=true
app.auth.jwt.secret=e2e-jwt-secret-e2e-jwt-secret-e2e
app.auth.oauth2.default-client-secret=e2e-client-secret
app.auth.oauth2.ephemeral-key-enabled=true

logging.file.name=target/auth-e2e.log
