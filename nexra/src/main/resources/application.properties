spring.application.name=nexra
spring.threads.virtual.enabled=true
spring.config.import=optional:classpath:application-auth.properties,optional:classpath:application-employee.properties,optional:classpath:application-attendance.properties,optional:classpath:application-leave.properties,optional:classpath:application-timesheet.properties,optional:classpath:application-onboarding.properties,optional:classpath:application-performance.properties,optional:classpath:application-recruitment.properties,optional:classpath:application-payroll.properties

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.data.redis.repositories.enabled=false

logging.level.root=INFO
logging.level.com.nexra.hrms.nexra=INFO
