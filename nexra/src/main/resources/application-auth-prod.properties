server.port=8081

spring.datasource.url=${AUTH_DB_URL}
spring.datasource.username=${AUTH_DB_USERNAME}
spring.datasource.password=${AUTH_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.data.redis.host=${AUTH_REDIS_HOST}
spring.data.redis.port=${AUTH_REDIS_PORT}
spring.data.redis.password=${AUTH_REDIS_PASSWORD:}

app.auth.security.redis-enabled=true
app.auth.mail.enabled=true
app.auth.mail.from=${AUTH_MAIL_FROM}
app.auth.expose-verification-token-in-response=false
app.auth.bootstrap.enabled=false
app.auth.jwt.secret=${AUTH_JWT_SECRET}
app.auth.oauth2.issuer=${AUTH_OAUTH2_ISSUER}
app.auth.oauth2.default-client-secret=${AUTH_OAUTH2_DEFAULT_CLIENT_SECRET}
app.auth.oauth2.ephemeral-key-enabled=false
app.auth.oauth2.keystore-location=${AUTH_OAUTH2_KEYSTORE_LOCATION}
app.auth.oauth2.keystore-password=${AUTH_OAUTH2_KEYSTORE_PASSWORD}
app.auth.oauth2.keystore-key-alias=${AUTH_OAUTH2_KEY_ALIAS}
app.auth.oauth2.keystore-key-password=${AUTH_OAUTH2_KEY_PASSWORD}

spring.mail.host=${AUTH_SMTP_HOST}
spring.mail.port=${AUTH_SMTP_PORT}
spring.mail.username=${AUTH_SMTP_USERNAME}
spring.mail.password=${AUTH_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
management.endpoint.health.group.readiness.include=readinessState,db,redis,mail
