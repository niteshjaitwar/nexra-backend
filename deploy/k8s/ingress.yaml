apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexra
  namespace: nexra
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  tls:
  - hosts:
    - api.nexra.example
    secretName: nexra-tls
  rules:
  - host: api.nexra.example
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexra
            port:
              number: 80
