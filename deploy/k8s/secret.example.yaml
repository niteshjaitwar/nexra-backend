apiVersion: v1
kind: Secret
metadata:
  name: nexra-secrets
  namespace: nexra
type: Opaque
stringData:
  DB_URL: "jdbc:mysql://mysql:3306/nexra"
  DB_USERNAME: "nexra_user"
  DB_PASSWORD: "replace-me"
  JWT_SECRET: "replace-me-with-strong-secret"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  MAIL_HOST: "smtp.example.com"
  MAIL_PORT: "587"
  MAIL_USERNAME: "replace-me"
  MAIL_PASSWORD: "replace-me"

